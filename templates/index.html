<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>Downloader Paket RUP Kalsel</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    width:400px;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    font-size:14px;
    margin-bottom:30px;
}

select{
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    margin-top:20px;
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#27ae60;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#999;
}

.loading{
    display:none;
    margin-top:15px;
    color:#555;
}

</style>

<script>

function showLoading(){
    document.getElementById("loading").style.display="block";
}

</script>

</head>

<body>

<div class="container">

<h1>Downloader RUP</h1>

<div class="subtitle">
Download Paket RUP Provinsi Kalimantan Selatan
</div>

<form action="/download" method="post" onsubmit="showLoading()">

<select name="tahun">

{% for t in tahun_list %}
<option value="{{t}}">{{t}}</option>
{% endfor %}

</select>

<button type="submit">
⬇ Download Excel
</button>

</form>

<div id="loading" class="loading">
Sedang mengambil data dari SiRUP...
</div>

<div class="footer">
Tool internal crawler SiRUP
</div>

</div>

</body>
</html>
